name: GPU Weekly Email Report

on:
  schedule:
    - cron: "30 1 * * 1"
  workflow_dispatch:
    inputs:
      keywords:
        description: "Search keywords (comma-separated)"
        required: true
        default: "GPU,GPUŠťŹňŐíňÖĘ,GPUš«ŚňŐŤ,š«ŚňŐŤŠťŹňŐí,GPUšžčŔÁü,š«ŚňŐŤšžčŔÁü,ŠÖ║š«ŚŠťŹňŐí"
        type: string
      days:
        description: "How many recent days"
        required: true
        default: "7"
        type: string
      max_pages:
        description: "Max pages per site"
        required: true
        default: "3"
        type: string
      sites:
        description: "Site keys (comma-separated) or all"
        required: true
        default: "ccgp,ggzy,zcygov,zycg,szecp,cebpub,cebpubservice,mofcom,ebnew,chinabidding,365trade,ecsg,ygcgfw"
        type: string
      dry_run:
        description: "Preview only (no email send)"
        required: true
        default: false
        type: boolean

concurrency:
  group: gpu-weekly-email
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate email secrets
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          if [ -z "$EMAIL_SENDER" ] || [ -z "$EMAIL_PASSWORD" ]; then
            echo "Missing EMAIL_SENDER or EMAIL_PASSWORD repository secret."
            exit 1
          fi

      - name: Run GPU report
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.GPU_EMAIL_RECEIVERS }}
          TZ: Asia/Shanghai
        run: |
          KEYWORDS="${{ github.event.inputs.keywords || 'GPU,GPUŠťŹňŐíňÖĘ,GPUš«ŚňŐŤ,š«ŚňŐŤŠťŹňŐí,GPUšžčŔÁü,š«ŚňŐŤšžčŔÁü,ŠÖ║š«ŚŠťŹňŐí' }}"
          DAYS="${{ github.event.inputs.days || '7' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '3' }}"
          SITES="${{ github.event.inputs.sites || 'ccgp,ggzy,zcygov,zycg,szecp,cebpub,cebpubservice,mofcom,ebnew,chinabidding,365trade,ecsg,ygcgfw' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          echo "Run time: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "keywords=$KEYWORDS days=$DAYS max_pages=$MAX_PAGES sites=$SITES dry_run=$DRY_RUN"

          if [ "$DRY_RUN" = "true" ]; then
            python3 gpu_tender_scraper.py \
              --keywords "$KEYWORDS" \
              --days "$DAYS" \
              --max-pages "$MAX_PAGES" \
              --sites "$SITES" \
              --dry-run
          else
            python3 gpu_tender_scraper.py \
              --keywords "$KEYWORDS" \
              --days "$DAYS" \
              --max-pages "$MAX_PAGES" \
              --sites "$SITES"
          fi
