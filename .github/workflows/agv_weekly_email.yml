name: AGV Weekly Email Report

on:
  # Monday 01:00 UTC == Monday 09:00 Asia/Shanghai
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      keyword:
        description: "Search keyword"
        required: true
        default: "AGV"
        type: string
      days:
        description: "How many recent days"
        required: true
        default: "7"
        type: string
      max_pages:
        description: "Max pages per site"
        required: true
        default: "5"
        type: string
      sites:
        description: "Site keys (comma-separated) or all"
        required: true
        default: "all"
        type: string
      dry_run:
        description: "Preview only (no email send)"
        required: true
        default: false
        type: boolean

concurrency:
  group: agv-weekly-email
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate email secrets
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          if [ -z "$EMAIL_SENDER" ] || [ -z "$EMAIL_PASSWORD" ]; then
            echo "Missing EMAIL_SENDER or EMAIL_PASSWORD repository secret."
            exit 1
          fi

      - name: Run AGV report
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          TZ: Asia/Shanghai
        run: |
          KEYWORD="${{ github.event.inputs.keyword || 'AGV' }}"
          DAYS="${{ github.event.inputs.days || '7' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '5' }}"
          SITES="${{ github.event.inputs.sites || 'all' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          echo "Run time: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "keyword=$KEYWORD days=$DAYS max_pages=$MAX_PAGES sites=$SITES dry_run=$DRY_RUN"

          if [ "$DRY_RUN" = "true" ]; then
            python3 agv_tender_scraper.py \
              --keyword "$KEYWORD" \
              --days "$DAYS" \
              --max-pages "$MAX_PAGES" \
              --sites "$SITES" \
              --dry-run
          else
            python3 agv_tender_scraper.py \
              --keyword "$KEYWORD" \
              --days "$DAYS" \
              --max-pages "$MAX_PAGES" \
              --sites "$SITES"
          fi
